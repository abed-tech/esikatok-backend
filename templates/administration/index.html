<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <meta name="api-base-url" content="">
    <title>EsikaTok - Administration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primaire: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' },
                        sombre: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',700:'#334155',800:'#1e293b',900:'#0f172a',950:'#020617' },
                        accent: { 400:'#f59e0b',500:'#f59e0b',600:'#d97706' },
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0f172a; color: #f1f5f9; }
        .fondu-entree { animation: fonduEntree 0.3s ease-out; }
        @keyframes fonduEntree { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .toast { animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 2.7s forwards; }
        @keyframes toastIn { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes toastOut { to { opacity:0; transform:translateY(-20px); } }
        .loader { border:3px solid rgba(255,255,255,0.1); border-top:3px solid #3b82f6; border-radius:50%; width:32px; height:32px; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .sidebar-lien.actif { background: rgba(59,130,246,0.15); color: #60a5fa; border-right: 3px solid #3b82f6; }
        .sidebar-lien:hover { background: rgba(255,255,255,0.05); }
        .graphique-barre { transition: height 0.6s ease-out; }
        .logo-apparition { animation: logoApparition 0.8s cubic-bezier(0.25,0.46,0.45,0.94) both; }
        @keyframes logoApparition { from { opacity:0; transform:scale(0.85) translateY(-10px); } to { opacity:1; transform:scale(1) translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        @media (max-width: 640px) {
            .table-responsive td, .table-responsive th { font-size: 11px; padding: 6px 8px; }
        }

        /* === Premium Badge Notifications (iOS / TikTok) === */
        .badge-notif {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px; height: 18px;
            padding: 0 5px;
            border-radius: 9px;
            background: linear-gradient(135deg, #FF3B30 0%, #FF453A 40%, #C1271A 100%);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            line-height: 1;
            letter-spacing: -0.2px;
            white-space: nowrap;
            pointer-events: none;
            position: relative;
            overflow: hidden;
            transform: scale(1);
            z-index: 10;
            box-shadow:
                0 0 0 2px var(--badge-ring, #0f172a),
                0 2px 6px rgba(255,59,48,0.45),
                0 4px 14px rgba(193,39,26,0.2);
        }
        .badge-notif::after {
            content: '';
            position: absolute;
            top: 1px; left: 18%; right: 18%; height: 40%;
            border-radius: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.32) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }
        .badge-notif--sm { min-width: 16px; height: 16px; padding: 0 4px; border-radius: 8px; font-size: 9px; }
        .badge-notif--dot { min-width: 10px; height: 10px; width: 10px; padding: 0; border-radius: 50%; font-size: 0; }
        .badge-notif--orange {
            background: linear-gradient(135deg, #FF9F0A 0%, #FF6B00 100%);
            box-shadow: 0 0 0 2px var(--badge-ring, #0f172a), 0 2px 6px rgba(255,159,10,0.45), 0 4px 14px rgba(255,107,0,0.2);
        }
        .badge-notif--abs { position: absolute; top: -3px; right: -1px; }
        @keyframes badgeEntree {
            0%   { transform: scale(0); opacity: 0; }
            60%  { transform: scale(1.2); opacity: 1; }
            80%  { transform: scale(0.93); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes badgePulse {
            0%   { transform: scale(1); }
            35%  { transform: scale(1.22); }
            65%  { transform: scale(0.92); }
            100% { transform: scale(1); }
        }
        @keyframes badgeSortie {
            0%   { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }
        .badge-notif--entree { animation: badgeEntree 250ms cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
        .badge-notif--pulse  { animation: badgePulse 300ms cubic-bezier(0.175,0.885,0.32,1.275); }
        .badge-notif--sortie { animation: badgeSortie 180ms ease-in forwards; }
    </style>
</head>
<body class="bg-sombre-950 text-sombre-50">
    <div id="admin-app" class="min-h-screen flex">

        <!-- === Sidebar === -->
        <aside id="sidebar" class="w-64 bg-sombre-900 border-r border-sombre-800 flex-shrink-0 hidden lg:flex flex-col h-screen sticky top-0">
            <div class="p-4 border-b border-sombre-800">
                <a href="javascript:void(0)" onclick="AdminApp.naviguer('tableau-de-bord')" class="flex items-center gap-3 group" title="Tableau de bord">
                    <img src="/static/images/logo-monochrome.svg" alt="EsikaTok" class="w-8 h-8 flex-shrink-0 group-hover:drop-shadow-[0_0_8px_rgba(96,165,250,0.4)] transition-all duration-300">
                    <div>
                        <h1 class="text-sm font-bold text-white leading-tight">EsikaTok</h1>
                        <p class="text-[10px] text-primaire-400 font-medium">Administration</p>
                    </div>
                </a>
            </div>
            <nav id="sidebar-nav" class="flex-1 py-3 space-y-0.5 px-2 overflow-y-auto">
                <!-- Rempli dynamiquement par AdminApp -->
            </nav>
            <div id="sidebar-profil" class="p-3 border-t border-sombre-800">
                <!-- Profil admin connecté -->
            </div>
        </aside>

        <!-- === Zone principale === -->
        <div class="flex-1 flex flex-col min-h-screen overflow-hidden">

            <!-- Header -->
            <header id="admin-header" class="bg-sombre-900/80 backdrop-blur-md border-b border-sombre-800 px-4 lg:px-6 py-3 flex items-center justify-between sticky top-0 z-30">
                <div class="flex items-center gap-3">
                    <button onclick="AdminApp.toggleSidebar()" class="lg:hidden p-1.5 rounded-lg hover:bg-sombre-800 transition">
                        <svg class="w-5 h-5 text-sombre-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </button>
                    <h2 id="header-titre-page" class="text-sm font-semibold text-white hidden lg:block"></h2>
                </div>
                <div id="header-profil" class="flex items-center gap-3">
                    <!-- Rempli dynamiquement -->
                </div>
            </header>

            <!-- Zone de contenu dynamique -->
            <main id="admin-contenu" class="flex-1 overflow-y-auto p-4 lg:p-6"></main>
        </div>
    </div>

    <!-- Toasts -->
    <div id="zone-toasts-admin" class="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Overlay sidebar mobile -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden lg:hidden" onclick="AdminApp.toggleSidebar()"></div>

    {% load static %}
    <!-- Modules JS séparés -->
    <script src="{% static 'administration/js/admin-api.js' %}"></script>
    <script src="{% static 'administration/js/admin-composants.js' %}"></script>
    <script src="{% static 'administration/js/admin-page-connexion.js' %}"></script>
    <script src="{% static 'administration/js/admin-page-tableau-de-bord.js' %}"></script>
    <script src="{% static 'administration/js/admin-page-moderation.js' %}"></script>
    <script src="{% static 'administration/js/admin-page-utilisateurs.js' %}"></script>
    <script src="{% static 'administration/js/admin-page-agents.js' %}"></script>
    <script src="{% static 'administration/js/admin-page-biens.js' %}"></script>
    <script src="{% static 'administration/js/admin-page-abonnements.js' %}"></script>
    <script src="{% static 'administration/js/admin-page-boosts.js' %}"></script>
    <script src="{% static 'administration/js/admin-page-messagerie.js' %}"></script>
    <script src="{% static 'administration/js/admin-page-annonces.js' %}"></script>
    <script src="{% static 'administration/js/admin-page-preoccupations.js' %}"></script>
    <script src="{% static 'administration/js/admin-page-administrateurs.js' %}"></script>
    <script src="{% static 'administration/js/admin-page-activites.js' %}"></script>
    <script src="{% static 'administration/js/admin-page-finances.js' %}"></script>
    <script src="{% static 'administration/js/admin-page-parametres.js' %}"></script>
    <script src="{% static 'administration/js/admin-app.js' %}"></script>
</body>
</html>
